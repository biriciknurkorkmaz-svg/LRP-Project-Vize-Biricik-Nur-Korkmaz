<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>LRP - Öğrenci Paneli</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-5">
    <div class="container">
        <div class="d-flex justify-content-between border-bottom mb-4 pb-2">
            <h2>Öğrenci Zimmet Paneli</h2>
            <a href="index.html" class="btn btn-outline-danger">Çıkış</a>
        </div>
        <div id="myPcInfo" class="card p-4 shadow-sm">
            <h5>Zimmetli Bilgisayarınız Yükleniyor...</h5>
        </div>
    </div>

    <script>
        async function fetchMyPC() {
            const username = localStorage.getItem('username'); // Login'de kaydetmiştik
            const res = await fetch(`/api/student/pc?username=${username}`);
            if (res.ok) {
                const pc = await res.json();
                document.getElementById('myPcInfo').innerHTML = `
                        <h4 class="text-primary">${pc.assetCode}</h4>
                        <p><b>Marka:</b> ${pc.brand}</p>
                        <p><b>İşlemci:</b> ${pc.cpu}</p>
                        <p><b>RAM:</b> ${pc.ram}</p>
                        <div class="alert alert-info">Bu bilgisayar size eğitim amaçlı tahsis edilmiştir.</div>
                    `;
            } else {
                document.getElementById('myPcInfo').innerHTML = "Henüz üzerinize kayıtlı bir bilgisayar bulunamadı.";
            }
        }
        fetchMyPC();
    </script>
</body>
</html>

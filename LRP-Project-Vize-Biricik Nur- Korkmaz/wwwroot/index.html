<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>LRP - Giriş Sistemi</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .login-card {
            width: 400px;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            background: white;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h3 class="text-center mb-4">LRP Sistem Girişi</h3>
        <div class="mb-3">
            <label class="form-label">Kullanıcı Adı</label>
            <input type="text" id="username" class="form-control" placeholder="Örn: admin">
        </div>
        <div class="mb-3">
            <label class="form-label">Şifre</label>
            <input type="password" id="password" class="form-control" placeholder="123">
        </div>
        <button onclick="login()" class="btn btn-primary w-100">Giriş Yap</button>
        <div id="error-msg" class="text-danger mt-3 text-center" style="display: none;">Hatalı kullanıcı adı veya şifre!</div>
    </div>

    <script>
    async function login() {
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;
        const errorMsg = document.getElementById('error-msg');

        // Backend'e "Bu kullanıcı doğru mu?" diye soracağız
        // Henüz backend'de bu API'yi yazmadık, bir sonraki adımda yazacağız
        const response = await fetch(`/api/auth/login?user=${u}&pass=${p}`);

        if (response.ok) {
            const data = await response.json();
            // Kullanıcı bilgilerini tarayıcı hafızasına (session) kaydediyoruz
            localStorage.setItem('userRole', data.role);
            localStorage.setItem('username', data.username);

            // Role göre yönlendirme (Ödev gereği)
            if (data.role === "Admin") {
                window.location.href = "/admin.html";
            } else {
                window.location.href = "/student.html";
            }
        } else {
            errorMsg.style.display = 'block';
        }
    }
    </script>

</body>
</html>
